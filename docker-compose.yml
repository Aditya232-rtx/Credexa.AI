version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credexa-backend
    ports:
      - "8765:8765"
    volumes:
      - ./:/app
    environment:
      - PYTHONPATH=/app/python
      - CRED_EXA_LAYOUTLMV3_MODEL=microsoft/layoutlmv3-base
    restart: unless-stopped

  frontend:
    image: node:20-slim
    container_name: credexa-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_DEV_SERVER_URL=http://localhost:5173
    command: >
      /bin/sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_line:
      - backend
    restart: unless-stopped
